<!DOCTYPE html>
<html>
<head>
  <title>OTTplay Movie Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<div class="flex flex-col h-screen">

  <!-- Header -->
  <div class="p-4 bg-black text-xl font-bold">
    🎬 OTTplay Recommender
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

  <!-- Input -->
  <div class="p-4 bg-black flex">
    <input id="input" class="flex-1 p-2 rounded text-black" placeholder="Ask for movies..." />
    <button onclick="sendMessage()" class="ml-2 px-4 py-2 bg-red-500 rounded">Send</button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addUserMessage(text) {
  chat.innerHTML += `<div class="text-right">${text}</div>`;
}

function addBotMessage(data) {
  let html = `<div class="text-left">`;

  data.results.forEach(m => {
    html += `
      <div class="bg-gray-800 p-3 rounded-xl my-2 shadow-lg">
        <div class="font-bold text-lg">${m.title}</div>
        <div class="text-sm">${m.genre} | ${m.language}</div>
        <div>⭐ ${m.rating} | ${m.platform}</div>
        <div class="text-xs text-gray-400 mt-1">${m.reason}</div>
      </div>
    `;
  });

  html += `</div>`;
  chat.innerHTML += html;
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const text = input.value;
  if (!text) return;

  addUserMessage(text);
  input.value = "";

  // Loading effect
  chat.innerHTML += `<div id="loading">Fetching recommendations...</div>`;

  const res = await fetch(`http://127.0.0.1:8000/chat?user_id=user1&message=${text}`);
  const data = await res.json();

  document.getElementById("loading").remove();

  addBotMessage(data);
}
</script>

</body>
</html>
